<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>시간의 반영</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    #current {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <img id="current" src="current.jpg" alt="">
  <script>
    const image = document.getElementById("current");

    function refreshImage() {
      const next = new Image();
      const url = `current.jpg?t=${Date.now()}`;
      next.onload = () => { image.src = url; };
      next.src = url;
    }

    refreshImage();
    setInterval(refreshImage, 20000);
  </script>
</body>
</html>
