<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시간의 반영 — Archive</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px 18px 60px;
      color: #111;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Noto Sans KR", sans-serif;
    }
    header {
      max-width: 1100px;
      margin: 0 auto 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 600;
    }
    .subtitle {
      margin: 0;
      color: #666;
      font-size: 14px;
    }
    #archive {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 28px 18px;
    }
    figure { margin: 0; }
    img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      object-fit: contain;
      background: #f2f2f2;
    }
    figcaption {
      padding-top: 8px;
      font-size: 13px;
      color: #333;
      line-height: 1.45;
    }
    .empty {
      max-width: 1100px;
      margin: 40px auto;
      color: #777;
    }
  </style>
</head>
<body>
  <header>
    <h1>시간의 반영</h1>
    <p class="subtitle">Archive</p>
  </header>

  <main id="archive"></main>

  <script>
    async function loadArchive() {
      const container = document.getElementById("archive");
      try {
        const response = await fetch(`archive.json?t=${Date.now()}`);
        if (!response.ok) throw new Error("archive.json을 불러오지 못했습니다.");
        const items = await response.json();

        if (!items.length) {
          container.outerHTML = '<p class="empty">아직 기록된 사진이 없습니다.</p>';
          return;
        }

        container.innerHTML = items.map(item => `
          <figure>
            <a href="${item.file}" target="_blank" rel="noopener">
              <img src="${item.file}" loading="lazy" alt="${item.label}">
            </a>
            <figcaption>${item.label}</figcaption>
          </figure>
        `).join("");
      } catch (error) {
        container.outerHTML = `<p class="empty">${error.message}</p>`;
      }
    }

    loadArchive();
  </script>
</body>
</html>
