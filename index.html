<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding@1.3.2/d2coding.css">

<style>
:root{
  --pc-width:500px;
  --top:160px;
  --bottom:180px;
  --gap:150px;
  --time-gap:10px;
}
*{
  box-sizing:border-box;
}
body{
  margin:0;
  background:#fff;
  color:#111;
}
main{
  max-width:100%;
  padding:var(--top) 24px var(--bottom);
}
#timeline{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:var(--gap);
}
.entry{
  width:min(var(--pc-width),100%);
}
.time-label{
  display:block;
  width:100%;
  margin:0 0 var(--time-gap);
  padding:0;
  font-family:D2Coding,monospace;
  font-size:13px;
  font-weight:400;
  line-height:1.4;
  color:#111;
  font-variant-numeric:tabular-nums;
}
.now-space{
  width:100%;
  aspect-ratio:100 / 50;
}
a{
  display:block;
  width:100%;
  text-decoration:none;
  cursor:pointer;
}
img{
  display:block;
  width:100%;
  height:auto;
  margin:0;
}
.message{
  width:min(var(--pc-width),100%);
  margin:0;
  font-family:D2Coding,monospace;
  font-size:13px;
  line-height:1.5;
}
@media (max-width:700px){
  :root{
    --top:110px;
    --bottom:120px;
    --gap:110px;
  }
  .entry{
    width:100%;
  }
  .time-label{
    font-size:12.5px;
  }
}
</style>
</head>
<body>
<main>
  <div id="timeline">
    <section class="entry now-entry" aria-label="현재">
      <div class="time-label">[NOW]</div>
      <div class="now-space" aria-hidden="true"></div>
    </section>

    <div id="archive" style="display:contents"></div>
  </div>
</main>

<script>
function trimSeconds(label){
  const match=String(label).match(
    /^(\d{4}\.\d{2}\.\d{2})\s+(\d{2}:\d{2})/
  );
  return match ? `${match[1]} ${match[2]}` : String(label);
}

fetch(`archive.json?t=${Date.now()}`,{cache:"no-store"})
  .then(response=>{
    if(!response.ok){
      throw new Error("archive.json을 불러올 수 없습니다.");
    }
    return response.json();
  })
  .then(items=>{
    const archive=document.getElementById("archive");

    if(!Array.isArray(items) || items.length===0){
      archive.outerHTML='<p class="message">아직 기록된 사진이 없습니다.</p>';
      return;
    }

    archive.outerHTML=items.map(item=>{
      const label=trimSeconds(item.label);
      return `
        <article class="entry">
          <time class="time-label">[${label}]</time>
          <a
            href="${item.file}"
            target="_blank"
            rel="noopener"
            aria-label="${label} 원본 이미지 열기"
          >
            <img
              src="${item.file}"
              alt=""
              loading="lazy"
              decoding="async"
            >
          </a>
        </article>
      `;
    }).join("");
  })
  .catch(error=>{
    document.getElementById("archive").outerHTML=
      `<p class="message">${error.message}</p>`;
  });
</script>
</body>
</html>
