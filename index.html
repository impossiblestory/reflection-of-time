<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/joungkyun/font-d2coding@1.3.2/d2coding.css">

<style>
:root{
  --pc-width:500px;
  --mobile-width:100%;
  --top:120px;
  --bottom:180px;
  --gap:150px;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#fff;
  color:#111;
}
main{
  max-width:100%;
  padding:var(--top) 24px var(--bottom);
}
#archive{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:var(--gap);
}
article{
  width:min(var(--pc-width),100%);
}
time{
  display:block;
  margin:0 0 14px;
  font-family:D2Coding,monospace;
  font-size:14px;
  font-variant-numeric:tabular-nums;
}
a{
  display:block;
  text-decoration:none;
}
img{
  display:block;
  width:100%;
  height:auto;
}
@media (max-width:700px){
  :root{
    --top:80px;
    --bottom:120px;
    --gap:110px;
  }
  article{
    width:100%;
  }
  time{
    font-size:13px;
  }
}
</style>
</head>
<body>
<main>
<div id="archive"></div>
</main>

<script>
function trimSeconds(label){
  const m=String(label).match(/^(\d{4}\.\d{2}\.\d{2})\s+(\d{2}:\d{2})/);
  return m?`${m[1]} ${m[2]}`:label;
}

fetch("archive.json?t="+Date.now(),{cache:"no-store"})
.then(r=>r.json())
.then(items=>{
 document.getElementById("archive").innerHTML=items.map(item=>{
   const label=trimSeconds(item.label);
   return `<article>
      <time>${label}</time>
      <a href="${item.file}" target="_blank" rel="noopener">
        <img src="${item.file}" alt="" loading="lazy">
      </a>
    </article>`;
 }).join("");
})
.catch(()=>{
 document.getElementById("archive").innerHTML="<p>archive.json을 불러올 수 없습니다.</p>";
});
</script>
</body>
</html>
